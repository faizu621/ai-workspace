server:
  port: 8084

spring:
  application:
    name: task-service
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_workspace_tasks
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
